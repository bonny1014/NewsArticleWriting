<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Newspaper Article — Writing Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins','Segoe UI',sans-serif;background:#FAF9F6;min-height:100vh;color:#333}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
.screen{display:none}.screen.active{display:block}

/* Sticky bar */
#stickyBar{position:sticky;top:0;z-index:80;display:flex;align-items:center;padding:8px 16px;gap:12px;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.15)}
#stickyBar .back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;padding:5px 10px;font-weight:700;font-size:12px;flex-shrink:0}
#stickyBar .level-badge{background:rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;font-weight:700;font-size:11px;letter-spacing:.5px;flex-shrink:0;text-transform:uppercase}
#stickyBar .dots{display:flex;gap:4px;flex:1;justify-content:center}
#stickyBar .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border:2px solid transparent;transition:all .2s;cursor:pointer}
#stickyBar .checklist-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:6px 14px;font-weight:700;font-size:12px;display:flex;align-items:center;gap:6px;flex-shrink:0;white-space:nowrap}

/* Sidebar */
#sidebarOverlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90;display:none}
#sidebar{position:fixed;top:0;right:0;height:100vh;width:320px;background:#fff;border-left:2px solid #e0e0e0;z-index:100;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:none}
#sidebar.open{transform:translateX(0);box-shadow:-4px 0 24px rgba(0,0,0,.12)}
#sidebarOverlay.open{display:block}

/* Cards */
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;border:2px solid #e0e0e0}
.card-title{font-weight:800;font-size:15px;margin-bottom:10px;color:#333}

/* Checklist button */
.check-btn{display:flex;align-items:flex-start;gap:12px;width:100%;background:transparent;border:none;padding:10px 12px;border-radius:8px;text-align:left;transition:all .2s;margin-bottom:2px}
.check-btn.checked{background:#E8F5E9}
.check-box{width:24px;height:24px;border-radius:6px;border:2px solid #ccc;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;margin-top:1px}
.check-box.checked{border-color:#2E7D32;background:#2E7D32}
.check-label{font-size:14px;color:#444;line-height:1.5;transition:all .2s}
.check-label.checked{color:#2E7D32;font-weight:600;text-decoration:line-through}

/* Section button */
.section-btn{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:14px;background:#fff;cursor:pointer;text-align:left;border-width:3px;border-style:solid;box-shadow:0 2px 8px rgba(0,0,0,.06);width:100%;font-family:inherit;transition:all .2s;margin-bottom:12px}
.section-btn.done{background:#E8F5E9;border-color:#2E7D32}
.section-num{width:42px;height:42px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0}
.section-num.done{background:#2E7D32}

/* Nav buttons */
.nav-btn{padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;border:2px solid #ddd;background:#fff;color:#555}
.nav-btn.primary{color:#fff;border:none}

.max-w{max-width:700px;margin:0 auto;padding:0 20px}
.max-w-sm{max-width:500px;margin:0 auto;padding:0 20px}

/* Example text */
.example-text{font-family:Georgia,serif;font-size:14px;color:#444;line-height:1.7;padding:14px;background:#FAFAFA;border-radius:10px;border:1px solid #eee;white-space:pre-line;margin-bottom:10px}
.starter-text{font-family:Georgia,serif;font-size:14px;color:#555;font-style:italic;padding:8px 14px;background:#f9f9f9;border-radius:8px;line-height:1.5;margin-bottom:8px}

/* Speech tag pill */
.tag-pill{background:#FFF9C4;border:1px solid #FFD54F;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:600;color:#5D4037;display:inline-block;margin:0 6px 6px 0}

/* Level cards */
.level-card{border-radius:18px;overflow:hidden;text-align:left;border-width:3px;border-style:solid;cursor:pointer;position:relative;margin-bottom:20px}
.level-header{color:#fff;padding:16px 24px;display:flex;align-items:center;gap:14px}
.level-header .emoji{font-size:32px}
.level-header .title{font-weight:800;font-size:20px}
.level-header .sub{font-size:13px;opacity:.85}

/* Image picker card */
.img-card{border:3px solid #ddd;border-radius:16px;background:#fff;cursor:pointer;overflow:hidden;margin-bottom:16px;display:flex;align-items:stretch;transition:all .2s;text-align:left;width:100%}
.img-card:hover{border-color:#1565C0;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.img-card .preview{width:160px;flex-shrink:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;padding:12px}
.img-card .info{padding:16px 20px;flex:1}
.img-card .info h3{font-weight:800;font-size:18px;color:#222;margin-bottom:4px}
.img-card .info p{font-size:14px;color:#666;line-height:1.5}
</style>
</head>

<div id="app"></div>

const SECTIONS=[{id:"headline",label:"Headline",emoji:"📰",color:"#D32F2F",bg:"#FFEBEE",description:"The title of your newspaper article — big, bold, and attention-grabbing!",whatToWrite:["A SHORT title (5–10 words) that tells the reader what the story is about.","Use a strong ACTION verb like saves, discovers, destroys, wins, escapes.","Do NOT put a period at the end."],checklist:["My headline is short (5–10 words)","My headline uses a strong action verb","My headline tells the reader what the article is about","My headline does NOT have a period at the end"]},{id:"byline",label:"Byline & Dateline",emoji:"✍️",color:"#7B1FA2",bg:"#F3E5F5",description:"The byline tells readers WHO wrote the article. The dateline tells WHERE and WHEN.",whatToWrite:['Line 1 — Byline: Write "By" followed by your full name.',"Line 2 — Dateline: Write the CITY in ALL CAPS, then a dash (—), then start your first sentence."],examples:["By Samira Khan\nTORONTO — A local family received...","By Marcus Lee\nOTTAWA — Scientists at the Canadian Museum of Nature announced today..."],checklist:['I have a byline that says "By [My Full Name]"',"I have a dateline with the city in ALL CAPS","My dateline has a dash (—) after the city name"]},{id:"lead",label:"The Lead",emoji:"🎯",color:"#1565C0",bg:"#E3F2FD",description:"The FIRST paragraph. The MOST important part — it hooks the reader and gives the big picture right away.",whatToWrite:["Answer the 5 W\u2019s: Who? What? Where? When? Why or How?","Start with a HOOK — something that grabs the reader\u2019s attention.","Write 2–4 sentences.","Give the most important information FIRST."],checklist:["My lead is 2–4 sentences long","My lead answers WHO the story is about","My lead answers WHAT happened","My lead answers WHERE it happened","My lead answers WHEN it happened","My lead starts with a hook that grabs attention"]},{id:"body",label:"The Body",emoji:"📝",color:"#2E7D32",bg:"#E8F5E9",description:"The middle paragraphs. Add DETAILS, SUPPORTING FACTS, and a QUOTATION to make your story come alive.",whatToWrite:["Write 2–3 paragraphs that expand on your lead.","Include at least 3 SUPPORTING DETAILS — facts, descriptions, or events that explain the story further.","Include at least 1 QUOTATION from a person in the story (see the Quotation Help section below!).","Put facts in ORDER OF IMPORTANCE — most important details first, less important ones later."],supportingDetailsTip:{title:"What counts as a supporting detail?",items:['A specific fact or number (e.g., "The fire burned for 3 hours.")',"A description of what happened step by step","Background information that helps the reader understand the story","A cause or effect (why something happened, or what happened because of it)"]},checklist:["I have at least 3 supporting details in my body paragraphs","Supporting detail #1 is included","Supporting detail #2 is included","Supporting detail #3 is included","I included at least 1 quotation with quotation marks",'My quotation has a speech tag (said, explained, etc.)',"My quotation tells us WHO is speaking","My details are in order of importance (most important first)"]},{id:"tail",label:"The Tail",emoji:"🔚",color:"#E65100",bg:"#FFF3E0",description:"The LAST paragraph. Wrap up your article with extra details, what might happen next, or a final thought.",whatToWrite:["Write 2–3 sentences to close your article.","You can include: what might happen next, how people are feeling, a look to the future, or a final interesting detail.","Do NOT introduce brand new major information here — this is for wrapping up."],checklist:["My tail is 2–3 sentences long","My tail wraps up the story (what happens next, how people feel, or a final detail)","My tail does NOT introduce major new information"]},{id:"conventions",label:"Writing Conventions",emoji:"✏️",color:"#455A64",bg:"#ECEFF1",description:"The RULES of newspaper writing. These apply to your ENTIRE article — every section must follow these conventions.",whatToWrite:["Write in THIRD PERSON — use he, she, they, the student, the mayor. Never use I, me, my, we, or you.","Write in PAST TENSE — the event already happened. Use words like discovered, announced, explained (not discovers, announces, explains). Exception: quotes can be in any tense because they are someone\u2019s exact words.","Keep it OBJECTIVE — report the facts only. Do NOT include your own opinion or feelings. Let the reader decide how to feel.",'Use DESCRIPTIVE and PRECISE language — instead of "it was bad," say "the storm destroyed 14 homes." Use specific numbers, names, and details.',"Use FORMAL language — no slang, no texting language, no exclamation marks (unless inside a quote). Write like a professional journalist.","Write in COMPLETE SENTENCES with correct spelling, punctuation, and grammar.","Start a NEW PARAGRAPH for each new idea or when a different person is speaking."],checklist:["My entire article is written in THIRD PERSON (no I, me, my, we, you)","My article is written in PAST TENSE (except inside quotations)","I did NOT include my own opinions or feelings — only facts","I used descriptive and precise language (specific names, numbers, details)","I used formal language (no slang, no texting language, no exclamation marks outside quotes)","I wrote in complete sentences with correct spelling and punctuation","I started a new paragraph for each new idea or speaker","I re-read my article out loud to check that it sounds like a real news report"]}];

const PEER_REVIEW=[{id:"structure",label:"Article Structure",emoji:"🏗️",color:"#1565C0",items:[{check:"The article has a headline (short, strong verb, no period)"},{check:"There is a byline with the author\u2019s name"},{check:"There is a dateline with the city in ALL CAPS and a dash"},{check:"The lead paragraph answers most of the 5 W\u2019s (Who, What, Where, When, Why/How)"},{check:"The body has at least 3 supporting details"},{check:"The body includes at least 1 quotation with quotation marks and a speech tag"},{check:"The tail wraps up the story (2–3 sentences, no new major info)"}]},{id:"conventions",label:"Writing Conventions",emoji:"✏️",color:"#455A64",items:[{check:"The article is written in third person (no I, me, my, we, you)"},{check:"The article is written in past tense (except inside quotations)"},{check:"The article is objective — no opinions or personal feelings"},{check:"The language is descriptive and precise (specific names, numbers, details)"},{check:"The language is formal (no slang, no texting language, no unnecessary exclamation marks)"}]},{id:"spag",label:"Spelling, Punctuation & Grammar",emoji:"🔍",color:"#7B1FA2",items:[{check:"Sentences are complete (no fragments or run-ons)"},{check:"Spelling is correct (I circled any misspelled words for my partner)"},{check:"Punctuation is correct (periods, commas, quotation marks)"},{check:"New paragraphs start for new ideas or new speakers"}]},{id:"quality",label:"Overall Quality",emoji:"⭐",color:"#E65100",items:[{check:"The article makes sense and is easy to follow"},{check:"The headline makes me want to read the article"},{check:"The article sounds like a real newspaper report"}]}];

const TEACHER_CODE="REPORTER2026";
const totalItems=SECTIONS.reduce((s,sec)=>s+sec.checklist.length,0);

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let state={level:"select",practiceImage:null,activeSection:null,practiceChecked:{},finalChecked:{},sidebarOpen:false,peerReviewMode:false,peerChecked:{},teacherUnlocked:false};

function save(){try{localStorage.setItem("naw-state",JSON.stringify(state))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem("naw-state"));if(d){Object.assign(state,d);state.sidebarOpen=false;state.level="select";state.activeSection=null;state.peerReviewMode=false}}catch(e){}}
load();

function getChecked(){return state.level==="final"?state.finalChecked:state.practiceChecked}
function setChecked(k,v){if(state.level==="final")state.finalChecked[k]=v;else state.practiceChecked[k]=v}
function countObj(o){return Object.values(o).filter(Boolean).length}
function secComplete(sec,chk){return sec.checklist.every((_,i)=>chk[sec.id+"-"+i])}
function totalCheckedCount(){return countObj(getChecked())}
function progress(){return Math.round(totalCheckedCount()/totalItems*100)}

// Compact code encoding — turns checklist state into short alphanumeric codes
const SEC_IDS=SECTIONS.map(s=>s.id);
const SEC_COUNTS=SECTIONS.map(s=>s.checklist.length);
const IMG_LIST=["store","labubu","game"];
const PEER_SEC_IDS=PEER_REVIEW.map(s=>s.id);
const PEER_SEC_COUNTS=PEER_REVIEW.map(s=>s.items.length);

function encodeBits(secs,counts,chkObj){
  let bits="";
  secs.forEach(function(sec,si){for(let i=0;i<counts[si];i++){bits+=chkObj[sec+"-"+i]?"1":"0"}});
  return bits;
}
function decodeBits(bits,secs,counts){
  const obj={};let pos=0;
  secs.forEach(function(sec,si){for(let i=0;i<counts[si];i++){if(bits[pos]==="1")obj[sec+"-"+i]=true;pos++}});
  return obj;
}

function generateSaveCode(){
  try{
    let bits=encodeBits(SEC_IDS,SEC_COUNTS,state.practiceChecked);
    bits+=encodeBits(SEC_IDS,SEC_COUNTS,state.finalChecked);
    bits+=(IMG_LIST.indexOf(state.practiceImage)+1).toString(2).padStart(2,"0");
    bits+=state.teacherUnlocked?"1":"0";
    // Pad to multiple of 4 for clean hex
    while(bits.length%4!==0)bits+="0";
    let num=BigInt("0b"+bits);
    return num.toString(36).toUpperCase();
  }catch(e){return""}
}
function loadSaveCode(code){
  try{
    code=code.trim().toUpperCase();
    let num=BigInt("0x0");
    try{num=BigInt("0x"+parseInt(code,36).toString(16))}catch(e){}
    // Use BigInt parse from base36
    num=0n;for(let i=0;i<code.length;i++){const c=code[i];const v=parseInt(c,36);num=num*36n+BigInt(v)}
    let bits=num.toString(2);
    const totalBits=SEC_COUNTS.reduce((a,b)=>a+b,0)*2+3;
    while(bits.length<totalBits)bits="0"+bits;
    // Trim padding
    const pcBitLen=SEC_COUNTS.reduce((a,b)=>a+b,0);
    const pcBits=bits.substring(0,pcBitLen);
    const fcBits=bits.substring(pcBitLen,pcBitLen*2);
    const imgBits=bits.substring(pcBitLen*2,pcBitLen*2+2);
    const tuBit=bits[pcBitLen*2+2];
    state.practiceChecked=decodeBits(pcBits,SEC_IDS,SEC_COUNTS);
    state.finalChecked=decodeBits(fcBits,SEC_IDS,SEC_COUNTS);
    const imgIdx=parseInt(imgBits,2)-1;
    if(imgIdx>=0&&imgIdx<IMG_LIST.length)state.practiceImage=IMG_LIST[imgIdx];
    state.teacherUnlocked=tuBit==="1";
    save();render();return true;
  }catch(e){return false}
}

// Peer review codes
function generatePeerCode(){
  try{
    let bits=encodeBits(PEER_SEC_IDS,PEER_SEC_COUNTS,state.peerChecked);
    while(bits.length%4!==0)bits+="0";
    let num=BigInt("0b"+bits);
    return "P"+num.toString(36).toUpperCase();
  }catch(e){return""}
}
function loadPeerCode(code){
  try{
    code=code.trim().toUpperCase();
    if(code[0]!=="P")return false;
    code=code.substring(1);
    let num=0n;for(let i=0;i<code.length;i++){num=num*36n+BigInt(parseInt(code[i],36))}
    let bits=num.toString(2);
    const totalBits=PEER_SEC_COUNTS.reduce((a,b)=>a+b,0);
    while(bits.length<totalBits)bits="0"+bits;
    const obj=decodeBits(bits,PEER_SEC_IDS,PEER_SEC_COUNTS);
    return Object.keys(obj).filter(k=>obj[k]);
  }catch(e){return false}
}

// HELPERS
// ═══════════════════════════════════════
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="innerHTML")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  if(typeof children==="string")el.textContent=children;
  else if(Array.isArray(children))children.forEach(c=>{if(c)el.appendChild(c)});
  else if(children instanceof HTMLElement)el.appendChild(children);
  return el;
}

function checkSvg(size=14){
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width",size);s.setAttribute("height",size);s.setAttribute("viewBox","0 0 14 14");s.setAttribute("fill","none");
  const p=document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d","M3 7L6 10L11 4");p.setAttribute("stroke","#fff");p.setAttribute("stroke-width","2.5");p.setAttribute("stroke-linecap","round");p.setAttribute("stroke-linejoin","round");
  s.appendChild(p);return s;
}

function progressRing(size,radius,strokeW,pct,color){
  const circ=2*Math.PI*radius;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="${strokeW}"/><circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="${color}" stroke-width="${strokeW}" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .4s ease"/></svg>`;
}

function makeCheckItem(key,label,chkObj,onChange){
  const isChecked=!!chkObj[key];
  const btn=h("button",{style:{display:"flex",alignItems:"flex-start",gap:"12px",width:"100%",background:isChecked?"#E8F5E9":"transparent",border:"none",padding:"10px 12px",borderRadius:"8px",textAlign:"left",cursor:"pointer",marginBottom:"2px",fontFamily:"inherit"},onClick:()=>{chkObj[key]=!chkObj[key];save();render();}});

  if(isChecked)box.appendChild(checkSvg(14));
  const lbl=h("span",{style:{fontSize:"14px",color:isChecked?"#2E7D32":"#444",fontWeight:isChecked?"600":"400",textDecoration:isChecked?"line-through":"none",lineHeight:"1.5"}},label);

    const done=h("div",{style:{padding:"16px",borderTop:"2px solid #eee",textAlign:"center",background:"#E8F5E9",flexShrink:"0"}});

}
